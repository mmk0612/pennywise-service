spring:
  application:
    name: pennywise-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pennywise}
    username: ${DB_USERNAME:pennywise}
    password: ${DB_PASSWORD:pennywise}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:pennywise-secret-key-very-long-and-secure-for-production-change-in-env}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

nvidia:
  api:
    key: ${NVIDIA_API_KEY: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}
    url: ${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    model: ${NVIDIA_API_MODEL:google/gemma-3n-e2b-it}

# Pennywise S3 configuration. Prefer setting via environment variables.
pennywise:
  s3:
    bucket: ${PENNYWISE_S3_BUCKET:pennywise-csv-links}
    region: ${PENNYWISE_S3_REGION:us-east-1}
    # Optional: set these only for local/dev. Prefer AWS credentials or IAM roles.
    access-key: ${PENNYWISE_S3_ACCESS_KEY:}
    secret-key: ${PENNYWISE_S3_SECRET_KEY:}
